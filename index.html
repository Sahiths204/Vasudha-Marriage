<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Surprise 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  text-align: center;
  color: white;
}

/* MAIN CARD */
.container {
  padding: 20px;
}

.couple-img {
  width: 90%;
  border-radius: 15px;
  margin: 15px 0;
}

/* BUTTON */
button {
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  background: #ff4081;
  color: white;
  font-size: 16px;
}

/* SLIDESHOW */
#slideshow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
}

#slideshow img {
  width: 95%;
}

.close {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 25px;
  cursor: pointer;
}

/* FIREWORKS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>

</head>

<body>

<div class="container">
  <h1>🎉 Happy Married Life 🎉</h1>
  <h2>Vasudha ❤️ Ramana</h2>

  <img src="vasudha.jpeg" class="couple-img">

  <p>
    Finally locked in forever 😂💍 <br>
    One for talking... one for listening 🤭 <br>
    Wishing you unlimited love, fights & fun! 💖
  </p>

  <button onclick="startCelebration()">🎁 Surprise</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="music2.mp3" loop></audio>

<!-- SLIDESHOW -->
<div id="slideshow">
  <span class="close" onclick="closeSlideshow()">✖</span>
  <img id="slideImage">
</div>

<!-- FIREWORKS -->
<canvas id="fireworks"></canvas>

<script>
// FIREWORKS
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
  for (let i = 0; i < 60; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5,
      vy: (Math.random()-0.5)*5,
      life: 80
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle = "hsl("+Math.random()*360+",100%,50%)";
    ctx.fillRect(p.x,p.y,3,3);

    if(p.life<=0) particles.splice(i,1);
  });

  requestAnimationFrame(animate);
}
animate();

/* 🎬 IMAGES (1–50) */
let images = [];
for (let i = 1; i <= 50; i++) {
  images.push(⁠ img${i}.jpeg ⁠);
}

let index = 0;
let interval;

/* 🎁 BUTTON CLICK */
function startCelebration() {
  document.getElementById("slideshow").style.display = "flex";

  const img = document.getElementById("slideImage");
  const music = document.getElementById("bgMusic");

  music.play().catch(()=>{});

  img.src = images[index];

  interval = setInterval(()=>{
    index = (index + 1) % images.length;
    img.src = images[index];

    // fireworks burst
    createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2);

  },1000);
}

function closeSlideshow() {
  document.getElementById("slideshow").style.display = "none";
  clearInterval(interval);
  document.getElementById("bgMusic").pause();
}
</script>

</body>
</html>
