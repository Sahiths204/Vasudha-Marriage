<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Surprise 💖</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 INTRO LOADER -->
<div id="loader">
  <canvas id="fireworks"></canvas>
  <h1 class="loading-text">💖 Wedding Surprise 💖</h1>
</div>

<!-- 💖 MAIN CONTENT -->
<div id="mainContent" class="hidden">
  <div class="container">
    <h1>🎉 Happy Married Life 🎉</h1>
    <h2>Vasudha ❤️ Ramana</h2>

    <img src="vasudha.jpeg" class="couple-img">

    <p class="message">
      Finally locked in forever 😂💍 <br>
      One for talking... one for listening 🤭 <br>
      Wishing you unlimited love, fights & fun! 💖
    </p>

    <button onclick="startCelebration()">🎁 Surprise</button>
  </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="music2.mp3" loop></audio>

<!-- 🎬 SLIDESHOW -->
<div id="slideshow" class="slideshow hidden">
  <span class="close" onclick="closeSlideshow()">✖</span>
  <img id="slideImage">
</div>

<script src="script.js"></script>

</body>
</html>
