<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Surprise 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎉 Happy Married Life 🎉</h1>
  <h2>Vasudha ❤️ Ramana</h2>

  <img src="vasudha.jpeg" class="couple-img">

  <p class="message">
    Finally locked in forever 😂💍<br>
    One for talking... one for listening 🤭<br>
    Wishing you unlimited love, fights & fun! 💖
  </p>

  <button onClick="startCelebration()">🎁 Surprise</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="music.mp3" loop></audio>

<!-- SLIDESHOW -->
<div id="slideshow" class="slideshow hidden">
  <span class="close" onclick="closeSlideshow()">✖</span>
  <img id="slideImage">
</div>

<canvas id="fireworks"></canvas>

<script>
  <script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let fireworkInterval = null;
let slideshowInterval = null;

/* 🎆 FIREWORKS */
function createFirework(x, y) {
  for (let i = 0; i < 80; i++) {
    particles.push({
      x,
      y,
      speedX: (Math.random() - 0.5) * 6,
      speedY: (Math.random() - 0.5) * 6,
      size: Math.random() * 3,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`, // ✅ FIXED
      life: 100
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}
animate();

/* 🎬 SLIDESHOW + 🎵 MUSIC */
let images = [
  "img1.jpeg",
  "img2.jpeg",
  "img3.jpeg",
  "img4.jpeg",
  "img5.jpeg"
];

let index = 0;

function startCelebration() {
  const slideshow = document.getElementById("slideshow");
  const img = document.getElementById("slideImage");
  const music = document.getElementById("bgMusic");

  // prevent multiple clicks from stacking intervals
  if (fireworkInterval || slideshowInterval) return;

  // SHOW SLIDESHOW
  slideshow.classList.remove("hidden");

  // PLAY MUSIC
  music.play();

  // FIRST IMAGE
  img.src = images[index];

  // SLIDESHOW LOOP
  slideshowInterval = setInterval(() => {
    index = (index + 1) % images.length;
    img.src = images[index];
  }, 2000);

  // FIREWORKS LOOP
  fireworkInterval = setInterval(() => {
    createFirework(
      Math.random() * canvas.width,
      Math.random() * canvas.height / 2
    );
  }, 500);
}

function closeSlideshow() {
  document.getElementById("slideshow").classList.add("hidden");

  clearInterval(slideshowInterval);
  clearInterval(fireworkInterval);

  slideshowInterval = null;
  fireworkInterval = null;

  document.getElementById("bgMusic").pause();
}
</script>
</script>
</body>
</html>
